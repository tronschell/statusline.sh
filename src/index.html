    <script>
      // Dev-only safety net: the production build inlines every
      // `process.env.NEXT_PUBLIC_*` reference as a string literal via Bun.build's
      // `define` map (see build.ts), but the dev server (`bun --hot src/dev.ts`)
      // does no such substitution, so a bare `process.env.X` lookup would throw
      // a ReferenceError in the browser. This shim makes those lookups return
      // `undefined` in dev; it's a no-op in prod because the references were
      // already replaced at build time.
      if (typeof process === "undefined") {
        window.process = { env: {} };
      }
    </script>
