name = "statusline-community"
main = "src/index.ts"
compatibility_date = "2025-05-01"

# Production custom domain. Uncomment ONLY after the statusline.sh zone is on
# Cloudflare DNS (i.e. you've switched the registrar nameservers at Vercel to
# the two Cloudflare-provided NS records and Cloudflare has marked the zone
# Active). Until then, `wrangler deploy` with this block enabled will fail
# with "zone not found".
#
# [[routes]]
# pattern = "api.statusline.sh"
# custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "statusline-community"
database_id = "c14c1902-21df-4cdd-a7bb-29921e8203d2"

[vars]
TURNSTILE_SITE_KEY = "0x4AAAAAADVg_EZkr8VbHhOf"
# Localhost entries are for `wrangler dev` so the Bun SPA at :3001 can fetch
# from the local Worker at :8787. The production deploy's ALLOWED_ORIGINS should
# be overridden in the Cloudflare dashboard to drop the localhost entries.
ALLOWED_ORIGINS = "https://statusline.sh,https://www.statusline.sh,https://statusline-maker.vercel.app,http://localhost:3001,http://127.0.0.1:3001"

# Rate limiting bindings (added in S2).
# Each endpoint gets its own namespace_id so counters don't share. Limits are
# per-key (we use the client IP) and reset every `period` seconds.

[[unsafe.bindings]]
name = "RATE_LIMITER_PUBLISH"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_FORK"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 20, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_INSTALL"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 30, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_LIST"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 120, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_DETAIL"
type = "ratelimit"
namespace_id = "1005"
simple = { limit = 240, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_INSTALLER"
type = "ratelimit"
namespace_id = "1006"
simple = { limit = 60, period = 60 }

# Workers Analytics Engine binding — community-detail view tracking. Writes
# are best-effort and never block the response.
#
# Disabled by default because Analytics Engine requires a one-click opt-in per
# account at https://dash.cloudflare.com/?to=/:account/workers/analytics-engine
# Uncomment after enabling. The handler in src/index.ts guards on `env.VIEWS`
# being defined, so views are simply not tracked while this binding is absent.
#
# [[analytics_engine_datasets]]
# binding = "VIEWS"
# dataset = "statusline_views"

# Cron Triggers — daily reaper for install_records older than 7 days.
[triggers]
crons = ["0 4 * * *"]
